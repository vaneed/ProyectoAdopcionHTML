<body>
    <section>
        <h2>Informacion de Contacto</h2>
    </section>
    <section id="formulario">
        <h2>Formulario de Contacto</h2>
        <form action="adopcion.html" method="post">
            <label for="">Nombre:</label>
            <input type="text" placeholder="Ingrese su nombre">
            <br>
            <label for="">Apellidos:</label>
            <input type="text" placeholder="Ingrese sus apellidos">
            <br>
            <label for="">Celular:</label>
            <input type="number" placeholder="Ingrese su numero de celular">
            <br>
            <label for="">Correo:</label>
            <input type="email" placeholder="Ingrese su correo">
            <br>
            <label for="">Tipo de consulta:</label>
            <br>
            <input type="radio" id="" value="a"> Adopcion
            <br>
            <input type="radio" id="" value="d"> Donacion
            <br>
            <input type="radio" id="" value="v"> Voluntariado
            <br>
            <input type="radio" id="" value="i"> Informacion general
            <br>
            <input type="radio" id="" value="o"> Otro
            <br>
            <input type="submit" value="ENVIAR">
        </form>
    </section>
    
</body>
